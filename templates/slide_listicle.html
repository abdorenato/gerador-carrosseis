<div class="slide slide-listicle">
  <div class="slide-number">{{ slide_number }}/{{ total_slides }}</div>
  <div class="{{ text_box_class }}">
    <div class="list-number">{{ slide_number }}</div>
    <h2 class="headline listicle-headline">{{ headline }}</h2>
    {% if body %}
    <p class="body-text listicle-body">{{ body }}</p>
    {% endif %}
  </div>
  <div class="swipe-hint">DESLIZE &rarr;</div>
</div>
