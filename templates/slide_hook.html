<div class="slide slide-hook">
  <div class="slide-number">{{ slide_number }}/{{ total_slides }}</div>
  <div class="{{ text_box_class }}">
    <div class="accent-bar"></div>
    <h1 class="headline hook-headline">{{ headline }}</h1>
    {% if body %}
    <p class="body-text hook-body">{{ body }}</p>
    {% endif %}
  </div>
  <div class="swipe-hint">DESLIZE &rarr;</div>
</div>
