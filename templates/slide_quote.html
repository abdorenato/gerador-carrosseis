<div class="slide slide-quote">
  <div class="slide-number">{{ slide_number }}/{{ total_slides }}</div>
  <div class="{{ text_box_class }}">
    <div class="quote-mark">&ldquo;</div>
    <h2 class="headline quote-headline">{{ headline }}</h2>
    {% if body %}
    <p class="body-text quote-body">&mdash; {{ body }}</p>
    {% endif %}
  </div>
  <div class="swipe-hint">DESLIZE &rarr;</div>
</div>
