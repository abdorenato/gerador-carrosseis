<div class="slide slide-cta">
  <div class="slide-number">{{ slide_number }}/{{ total_slides }}</div>
  <div class="accent-bar"></div>
  <h2 class="headline cta-headline">{{ headline }}</h2>
  {% if body %}
  <p class="body-text cta-body">{{ body }}</p>
  {% endif %}
  <div class="cta-buttons">
    <div class="cta-btn">💾 SALVE</div>
    <div class="cta-btn">📤 COMPARTILHE</div>
    <div class="cta-btn">💬 COMENTE</div>
  </div>
</div>
